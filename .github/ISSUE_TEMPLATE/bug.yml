name: Bug report
description: Report a reproducible Hookbound defect.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Hookbound and Go versions
      placeholder: v0.2.0, go1.26.5
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      render: go
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and relevant logs
      description: Remove payloads, credentials, signatures, cookies, and URL query secrets.
