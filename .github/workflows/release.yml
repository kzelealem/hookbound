name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'kzelealem/hookbound'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out signed tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify annotated signed release tag
        id: metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]] || {
            echo "invalid semantic release tag: $tag" >&2
            exit 1
          }
          ref_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" --jq '.object.type')"
          tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" --jq '.object.sha')"
          test "$ref_type" = tag || {
            echo "release tags must be annotated and cryptographically signed" >&2
            exit 1
          }
          verified="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.verification.verified')"
          reason="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.verification.reason')"
          target_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.object.type')"
          target_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.object.sha')"
          test "$verified" = true || {
            echo "release tag signature is not verified: $reason" >&2
            exit 1
          }
          test "$target_type" = commit || {
            echo "release tag must point directly to a commit" >&2
            exit 1
          }
          test "$target_sha" = "$(git rev-parse HEAD)" || {
            echo "checked-out commit does not match signed tag target" >&2
            exit 1
          }
          version="${tag#v}"
          source_date_epoch="$(git show -s --format=%ct "$target_sha")"
          build_date="$(git show -s --format=%cI "$target_sha")"
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "commit=$target_sha"
            echo "source_date_epoch=$source_date_epoch"
            echo "build_date=$build_date"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true

      - name: Verify source
        run: |
          set -euo pipefail
          go mod verify
          go test -race -shuffle=on -count=1 ./...
          go vet ./...
          test -z "$(gofmt -l .)"

      - name: Run PostgreSQL integration tests
        working-directory: integration/postgres
        env:
          HOOKBOUND_POSTGRES_IMAGE: postgres:17-alpine
        run: |
          set -euo pipefail
          go mod verify
          go test -tags=integration -race -shuffle=on -count=1 ./...

      - name: Build reproducible release archives
        shell: bash
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          COMMIT: ${{ steps.metadata.outputs.commit }}
          BUILD_DATE: ${{ steps.metadata.outputs.build_date }}
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
        run: |
          set -euo pipefail
          rm -rf dist staging
          mkdir -p dist staging
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              name="hookbound-${VERSION}-${os}-${arch}"
              directory="staging/${name}"
              mkdir -p "$directory"
              binary="hookbound"
              if [[ "$os" = windows ]]; then binary="hookbound.exe"; fi
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
                -trimpath -buildvcs=false \
                -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${BUILD_DATE}" \
                -o "${directory}/${binary}" ./cmd/hookbound
              cp LICENSE README.md CHANGELOG.md "$directory/"
              tar --sort=name --mtime="@${SOURCE_DATE_EPOCH}" \
                --owner=0 --group=0 --numeric-owner \
                -C staging -cf - "$name" | gzip -n > "dist/${name}.tar.gz"
            done
          done
          git archive --format=tar --prefix="hookbound-${VERSION}/" "$COMMIT" \
            | gzip -n > "dist/hookbound-${VERSION}-source.tar.gz"
          "staging/hookbound-${VERSION}-linux-amd64/hookbound" version

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          syft-version: v1.42.3
          output-file: dist/hookbound-${{ steps.metadata.outputs.version }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          LC_ALL=C sha256sum $(find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' | LC_ALL=C sort) > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Sign build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Sign SBOM attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: dist/hookbound-${{ steps.metadata.outputs.version }}-source.tar.gz
          sbom-path: dist/hookbound-${{ steps.metadata.outputs.version }}.spdx.json

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" dist/* \
            --verify-tag \
            --generate-notes \
            --title "$TAG"

      - name: Publish module to the Go proxy
        shell: bash
        env:
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          cd "$(mktemp -d)"
          GOPROXY=https://proxy.golang.org \
            go list -m "github.com/kzelealem/hookbound@${TAG}"
