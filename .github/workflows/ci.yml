name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        go: ['1.23.x', '1.25.x', '1.26.x']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go test -race -shuffle=on -count=1 ./...
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)"
      - run: go build ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@v1
        with:
          go-version-input: 1.26.x
          go-package: ./...
