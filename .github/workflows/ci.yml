name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true
      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go: ['1.23.0', '1.25.12', '1.26.5']
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Verify module
        run: go mod verify
      - name: Verify immutable workflow pins
        run: ./scripts/check-workflow-pins.sh
      - name: Test with race detector
        run: go test -race -shuffle=on -count=1 ./...
      - name: Vet
        run: go vet ./...
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Build
        run: go build ./...

  postgres-integration:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache-dependency-path: integration/postgres/go.sum
      - name: Verify integration module
        working-directory: integration/postgres
        run: go mod verify
      - name: Run PostgreSQL integration tests
        working-directory: integration/postgres
        env:
          HOOKBOUND_POSTGRES_IMAGE: postgres:17-alpine
        run: go test -tags=integration -race -shuffle=on -count=1 ./...

  fuzz:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true
      - name: Fuzz signature parsing
        run: GOMAXPROCS=2 go test -run '^$' -fuzz '^FuzzSignatureParser$' -fuzztime=10s -parallel=1 ./standard
      - name: Fuzz URL validation
        run: GOMAXPROCS=2 go test -run '^$' -fuzz '^FuzzValidateURL$' -fuzztime=10s -parallel=1 ./transport

  govulncheck:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Scan reachable Go vulnerabilities
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1
        with:
          go-version-input: 1.26.5
          go-package: ./...
